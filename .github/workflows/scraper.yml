name: EAPCET Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl
          
      - name: Run Scraper
        run: python eapcet_scraper.py
        
      - name: Commit progress back to repository
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add eapcet_checkpoint.json eapcet_all_data.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated scraper progress update - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
          
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eapcet-data
          path: |
            eapcet_all_data.csv
            eapcet_all_data.xlsx
